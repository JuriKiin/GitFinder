<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitFinder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>GitFinder</h1>
            <p class="subtitle">Find the commit that broke things</p>
        </header>

        <!-- Search View -->
        <div id="search-view">
            <!-- Repo Selector -->
            <section class="card">
                <label>Repository</label>
                <div id="saved-repos"></div>
                <div id="add-repo-form" style="display:none;">
                    <div class="add-repo-row">
                        <input type="text" id="repo-path-input" placeholder="Paste a path, e.g. ~/projects/my-repo" autocomplete="off">
                        <button id="add-repo-btn" onclick="addRepo()">Add</button>
                        <button class="cancel-btn" onclick="hideAddRepoForm()">Cancel</button>
                    </div>
                    <div id="add-repo-status" class="status"></div>
                </div>
                <button id="show-add-btn" class="add-repo-trigger" onclick="showAddRepoForm()">+ Add repository</button>
            </section>

            <!-- File Selector -->
            <section class="card" id="file-section" style="display:none;">
                <label for="file-input">Files to search</label>
                <div class="autocomplete-wrapper">
                    <input type="text" id="file-input" placeholder="Type to search files..." autocomplete="off">
                    <div id="file-dropdown" class="dropdown"></div>
                </div>
                <div id="file-chips" class="chips"></div>
            </section>

            <!-- Date Range -->
            <section class="card" id="date-section" style="display:none;">
                <label>Date Range</label>
                <div class="quick-filters">
                    <button class="quick-filter" onclick="applyQuickFilter(1)">24 hours</button>
                    <button class="quick-filter" onclick="applyQuickFilter(3)">3 days</button>
                    <button class="quick-filter" onclick="applyQuickFilter(7)">1 week</button>
                    <button class="quick-filter" onclick="applyQuickFilter(14)">2 weeks</button>
                    <button class="quick-filter" onclick="applyQuickFilter(30)">1 month</button>
                    <button class="quick-filter" onclick="applyQuickFilter(90)">3 months</button>
                </div>
                <div class="date-row">
                    <div class="date-field">
                        <label for="start-date" class="small-label">From</label>
                        <input type="date" id="start-date">
                    </div>
                    <div class="date-field">
                        <label for="end-date" class="small-label">To</label>
                        <input type="date" id="end-date">
                    </div>
                </div>
            </section>

            <!-- Search Button -->
            <section id="search-section" style="display:none;">
                <button id="search-btn" class="primary-btn" onclick="executeSearch()">Search Commits</button>
            </section>

            <!-- Results -->
            <section id="results-section" style="display:none;">
                <h2 id="results-heading"></h2>
                <div id="results-list"></div>
            </section>
        </div>

        <!-- Commit Detail View -->
        <div id="detail-view" style="display:none;">
            <button class="back-btn" onclick="showSearchView()">&larr; Back to results</button>
            <div class="card detail-card">
                <div class="detail-header">
                    <h2 id="detail-message"></h2>
                    <div class="detail-meta">
                        <span id="detail-hash" class="mono"></span>
                        <span id="detail-author"></span>
                        <span id="detail-date"></span>
                    </div>
                    <a id="detail-github-link" class="github-btn" href="#" target="_blank" rel="noopener" style="display:none;">View on GitHub</a>
                </div>
                <div class="diff-controls">
                    <span>Diff view:</span>
                    <button class="toggle-btn active" data-mode="line-by-line" onclick="switchDiffMode('line-by-line', this)">Line by line</button>
                    <button class="toggle-btn" data-mode="side-by-side" onclick="switchDiffMode('side-by-side', this)">Side by side</button>
                </div>
                <div id="detail-diff" class="diff-container">
                    <div class="loading">Loading diff...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
